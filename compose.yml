services:

    energiai-api:
        build: ./energiai-api
        container_name: energiai_api
        ports:
            - 8080:8080
        environment:
            - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/energiai
            - SPRING_DATASOURCE_USERNAME=admin
            - SPRING_DATASOURCE_PASSWORD=123456
        networks:
            - energiai_net
        volumes:
            - ./energiai-api:/app
            - ~/.m2:/root/.m2
        depends_on:
            - db
    db:
        image: mysql:9.7
        container_name: mysql_energiai
        ports:
            - "3307:3306"
        environment:
            MYSQL_ROOT_PASSWORD: 123456
            MYSQL_DATABASE: energiai
            MYSQL_USER: admin
            MYSQL_PASSWORD: 123456
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - energiai_net

volumes:
    mysql_data:
networks:
    energiai_net: